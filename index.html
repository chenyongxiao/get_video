<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>抖音视频下载</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--primary:#fe2c55;--primary-dark:#d91a3e;--bg:#0f0f0f;--card-bg:#1a1a1a;--card-border:#2a2a2a;--text:#fff;--text-secondary:#999;--text-muted:#666;--success:#00c853;--radius:16px;--radius-sm:12px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:env(safe-area-inset-bottom)}
.container{max-width:480px;margin:0 auto;padding:20px 16px}
.header{text-align:center;padding:24px 0 20px}
.logo{width:56px;height:56px;background:linear-gradient(135deg,#fe2c55,#ff6b35);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:0 8px 24px rgba(254,44,85,.3)}
.header h1{font-size:24px;font-weight:700;margin-bottom:8px;background:linear-gradient(135deg,#fe2c55,#ff6b35);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.subtitle{font-size:14px;color:var(--text-secondary);line-height:1.5}
.input-section{margin:16px 0}
.input-wrapper{position:relative;display:flex;align-items:center;background:var(--card-bg);border:1.5px solid var(--card-border);border-radius:var(--radius-sm);padding:0 16px;transition:border-color .3s}
.input-wrapper:focus-within{border-color:var(--primary)}
.input-wrapper input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:15px;padding:16px 0;min-height:52px;width:100%}
.input-wrapper input::placeholder{color:var(--text-muted)}
.clear-btn{background:none;border:none;color:var(--text-muted);cursor:pointer;padding:4px;display:flex;align-items:center;flex-shrink:0}
.download-btn{width:100%;margin-top:12px;padding:16px;background:linear-gradient(135deg,var(--primary),#ff6b35);border:none;border-radius:var(--radius-sm);color:#fff;font-size:16px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .2s,box-shadow .2s;box-shadow:0 4px 16px rgba(254,44,85,.3)}
.download-btn:active{transform:scale(.98)}
.download-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.status-section{margin:16px 0}
.status-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius);padding:24px;text-align:center}
.status-icon{display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.spinner{width:32px;height:32px;border:3px solid var(--card-border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.status-text{font-size:15px;color:var(--text-secondary);margin-bottom:12px}
.progress-bar{width:100%;height:4px;background:var(--card-border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--primary),#ff6b35);border-radius:2px;transition:width .3s}
.result-section{margin:16px 0}
.video-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius);overflow:hidden}
.video-info{padding:16px}
.video-title{font-size:15px;font-weight:500;line-height:1.5;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.video-meta{font-size:13px;color:var(--text-muted)}
.video-actions{display:flex;gap:10px;padding:0 16px 16px}
.action-btn{flex:1;padding:12px;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:transform .2s}
.action-btn:active{transform:scale(.97)}
.action-btn.primary{background:var(--primary);color:#fff}
.history-section{margin:24px 0}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-header h2{font-size:18px;font-weight:600}
.clear-history-btn{background:none;border:none;color:var(--text-muted);font-size:13px;cursor:pointer;padding:4px 8px}
.history-list{display:flex;flex-direction:column;gap:8px}
.history-item{display:flex;align-items:center;gap:12px;background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius-sm);padding:12px;cursor:pointer;transition:background .2s}
.history-item:active{background:#222}
.history-thumb{width:48px;height:48px;border-radius:8px;background:#2a2a2a;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center}
.history-thumb svg{opacity:.4}
.history-info{flex:1;min-width:0}
.history-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.history-time{font-size:12px;color:var(--text-muted)}
.history-delete{background:none;border:none;color:var(--text-muted);cursor:pointer;padding:4px;flex-shrink:0}
.empty-history{text-align:center;padding:32px 0;color:var(--text-muted);font-size:14px}
.footer{text-align:center;padding:20px 0}
.footer p{font-size:12px;color:var(--text-muted);line-height:1.6}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(0,0,0,.85);color:#fff;padding:12px 24px;border-radius:24px;font-size:14px;opacity:0;transition:all .3s;pointer-events:none;z-index:1000;backdrop-filter:blur(10px);white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.error-text{color:#ff5252!important}
.result-section,.status-section{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <svg viewBox="0 0 48 48" width="40" height="40">
                    <path fill="#fff" d="M24 4C12.95 4 4 12.95 4 24s8.95 20 20 20 20-8.95 20-20S35.05 4 24 4zm0 36c-8.82 0-16-7.18-16-16S15.18 8 24 8s16 7.18 16 16-7.18 16-16 16z"/>
                    <path fill="#fff" d="M28 16h-4v10.5c0 1.38-1.12 2.5-2.5 2.5S19 27.88 19 26.5s1.12-2.5 2.5-2.5c.28 0 .54.05.8.13V20c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5V16z"/>
                </svg>
            </div>
            <h1>抖音视频下载器</h1>
            <p class="subtitle">粘贴抖音分享链接，无水印下载视频到本地</p>
        </div>

        <div class="input-section">
            <div class="input-wrapper">
                <input type="text" id="videoUrl" placeholder="粘贴抖音分享链接，如：https://v.douyin.com/xxxxx/" />
                <button id="clearBtn" class="clear-btn" style="display:none;">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                    </svg>
                </button>
            </div>
            <button id="downloadBtn" class="download-btn">
                <span class="btn-icon">
                    <svg viewBox="0 0 24 24" width="22" height="22">
                        <path fill="currentColor" d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
                    </svg>
                </span>
                <span class="btn-text">解析并下载</span>
            </button>
        </div>

        <div id="statusSection" class="status-section" style="display:none;">
            <div class="status-card">
                <div class="status-icon" id="statusIcon"><div class="spinner"></div></div>
                <div class="status-text" id="statusText">正在解析视频链接...</div>
                <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            </div>
        </div>

        <div id="resultSection" class="result-section" style="display:none;">
            <div class="video-card">
                <div class="video-info">
                    <div class="video-title" id="videoTitle"></div>
                    <div class="video-meta" id="videoMeta"></div>
                </div>
                <div class="video-actions">
                    <button id="saveBtn" class="action-btn primary">
                        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                        保存到本地
                    </button>
                </div>
            </div>
        </div>

        <div class="history-section">
            <div class="section-header">
                <h2>下载记录</h2>
                <button id="clearHistoryBtn" class="clear-history-btn">清空</button>
            </div>
            <div id="historyList" class="history-list"></div>
        </div>

        <div class="footer">
            <p>提示：请确保粘贴的是抖音分享链接（以 https://v.douyin.com/ 开头）</p>
        </div>
    </div>

<script>
const videoUrlInput=document.getElementById('videoUrl'),clearBtn=document.getElementById('clearBtn'),downloadBtn=document.getElementById('downloadBtn'),statusSection=document.getElementById('statusSection'),statusText=document.getElementById('statusText'),statusIcon=document.getElementById('statusIcon'),progressFill=document.getElementById('progressFill'),resultSection=document.getElementById('resultSection'),videoTitle=document.getElementById('videoTitle'),videoMeta=document.getElementById('videoMeta'),saveBtn=document.getElementById('saveBtn'),historyList=document.getElementById('historyList'),clearHistoryBtn=document.getElementById('clearHistoryBtn');
let currentVideoUrl='',currentVideoInfo=null,isDownloading=false;
function showToast(msg,duration=2000){const e=document.querySelector('.toast');if(e)e.remove();const t=document.createElement('div');t.className='toast',t.textContent=msg,document.body.appendChild(t),requestAnimationFrame(()=>{t.classList.add('show')}),setTimeout(()=>{t.classList.remove('show'),setTimeout(()=>t.remove(),300)},duration)}
function formatTime(e){const t=new Date,n=t-e,o=Math.floor(n/6e4),i=Math.floor(n/36e5),r=Math.floor(n/864e5);return o<1?'刚刚':o<60?o+'分钟前':i<24?i+'小时前':r<7?r+'天前':e.toLocaleDateString('zh-CN')}
function setStatus(e,t=!1){statusText.textContent=e,statusText.className='status-text'+(t?' error-text':''),t?statusIcon.innerHTML='<svg viewBox="0 0 24 24" width="32" height="32" style="color:#ff5252"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>':statusIcon.innerHTML='<div class="spinner"></div>'}
function setProgress(e){progressFill.style.width=e+'%'}
function showStatus(e){statusSection.style.display=e?'block':'none'}
function showResult(e){resultSection.style.display=e?'block':'none'}
function loadHistory(){try{const e=JSON.parse(localStorage.getItem('douyin_download_history')||'[]');renderHistory(e)}catch{renderHistory([])}}
function escapeHtml(e){const t=document.createElement('div');return t.textContent=e,t.innerHTML}
function renderHistory(e){if(0===e.length){historyList.innerHTML='<div class="empty-history">暂无下载记录</div>';return}
historyList.innerHTML=e.map((e,t)=>'<div class="history-item" data-index="'+t+'"><div class="history-thumb"><svg viewBox="0 0 24 24" width="24" height="24" fill="#666"><path d="M8 5v14l11-7z"/></svg></div><div class="history-info"><div class="history-name">'+escapeHtml(e.title||'抖音视频')+'</div><div class="history-time">'+formatTime(new Date(e.time))+'</div></div><button class="history-delete" data-index="'+t+'" onclick="event.stopPropagation();deleteHistory('+t+')"><svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button></div>').join('');
document.querySelectorAll('.history-item').forEach(e=>{e.addEventListener('click',function(){const t=parseInt(this.dataset.index),n=JSON.parse(localStorage.getItem('douyin_download_history')||'[]'),o=n[t];o&&o.url&&(videoUrlInput.value=o.url,clearBtn.style.display='block',startDownload(o.url))})})}
function addHistory(e,t){try{const n=JSON.parse(localStorage.getItem('douyin_download_history')||'[]');n.some(e=>e.url===t)||(n.unshift({title:e,url:t,time:new Date().toISOString()}),n.length>20&&n.pop(),localStorage.setItem('douyin_download_history',JSON.stringify(n)),renderHistory(n))}catch{}}
function deleteHistory(e){try{const t=JSON.parse(localStorage.getItem('douyin_download_history')||'[]');t.splice(e,1),localStorage.setItem('douyin_download_history',JSON.stringify(t)),renderHistory(t)}catch{}}
async function startDownload(e){if(isDownloading)return;isDownloading=!0,downloadBtn.disabled=!0,downloadBtn.querySelector('.btn-text').textContent='解析中...',showStatus(!0),showResult(!1),setStatus('正在解析视频链接...'),setProgress(10);try{setProgress(30);const t=await fetch('/api/parse?url='+encodeURIComponent(e));if(!t.ok){const n=await t.json();throw new Error(n.detail||'解析失败')}const n=await t.json();currentVideoInfo=n,currentVideoUrl=n.video_url,setProgress(60),setStatus('正在获取视频文件...'),videoTitle.textContent=n.title||'抖音视频',videoMeta.textContent='作者: '+(n.author||'未知'),setProgress(80),setStatus('准备下载...'),showResult(!0),showStatus(!1),addHistory(n.title,e),showToast('视频解析成功！正在自动下载...'),setTimeout(()=>saveVideo(),500)}catch(t){showStatus(!0),setStatus(t.message||'解析失败，请检查链接是否正确',!0),setProgress(0),showToast('解析失败: '+(t.message||'未知错误'),3e3)}finally{isDownloading=!1,downloadBtn.disabled=!1,downloadBtn.querySelector('.btn-text').textContent='解析并下载'}}
async function saveVideo(){if(!currentVideoUrl){showToast('没有可下载的视频');return}
saveBtn.disabled=!0,saveBtn.innerHTML='<div class="spinner" style="width:18px;height:18px;border-width:2px;"></div> 下载中...';try{const e=currentVideoInfo?.title||'抖音视频',t='/api/download?url='+encodeURIComponent(currentVideoUrl)+'&title='+encodeURIComponent(e),n=document.createElement('a');n.href=t,document.body.appendChild(n),n.click(),document.body.removeChild(n),showToast('视频下载已开始！')}catch(e){showToast('下载失败: '+(e.message||'未知错误'),3e3)}finally{saveBtn.disabled=!1,saveBtn.innerHTML='<svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg> 保存到本地'}}
downloadBtn.addEventListener('click',()=>{const e=videoUrlInput.value.trim();e?startDownload(e):(showToast('请输入抖音分享链接'),videoUrlInput.focus())});
videoUrlInput.addEventListener('input',()=>{clearBtn.style.display=videoUrlInput.value?'block':'none'});
clearBtn.addEventListener('click',()=>{videoUrlInput.value='',clearBtn.style.display='none',videoUrlInput.focus()});
saveBtn.addEventListener('click',saveVideo);
clearHistoryBtn.addEventListener('click',()=>{confirm('确定清空所有下载记录吗？')&&(localStorage.removeItem('douyin_download_history'),renderHistory([]),showToast('历史记录已清空'))});
videoUrlInput.addEventListener('keydown',e=>{'Enter'===e.key&&downloadBtn.click()});
loadHistory();
document.addEventListener('paste',()=>{setTimeout(()=>{const e=videoUrlInput.value.trim();e&&(e.includes('douyin.com')||e.includes('v.douyin.com'))&&(clearBtn.style.display='block')},100)});
</script>
</body>
</html>
